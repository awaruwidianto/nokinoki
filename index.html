<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  
  <!-- Forces Chrome to look in the nokinoki folder, fixing the 404 -->
  <base href="/nokinoki/">

  <!-- Prevents zooming on iPhone -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  
  <!-- Connects your app to the manifest.json file -->
  <link rel="manifest" href="manifest.json" />
  
  <title>NOKI NOKI</title>
  
  <!-- Reference Fonts Link -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    /* ==========================================================
       AWARU UNIVERSE COSMIC VARIABLES & KEYFRAMES
       ========================================================== */
    :root{
      --body:#ff94cf;
      --body2:#a78bfa;
      --body3:#564179;
      --screen:#fff9f1;
      --screen2:#ffd2e9;
      --screenBorder:#564179;
      --ink:#27213f;
      --inkSoft:#5f5684;
      --button:#ffffff;
      --button2:#ffd2e9;
      --buttonBorder:#564179;
      --buttonShadow:#564179;
      --accent:#ff94cf;
      --wall1:#ffe58f;
      --wall2:#b5f7d3;
      --panel:rgba(255,255,255,.68);
      --danger:#ff5e97;
    }

    body.theme-pink{
      --body:#ff94cf; --body2:#a78bfa; --body3:#564179;
      --screen:#fff9f1; --screen2:#ffd2e9; --screenBorder:#564179;
      --ink:#27213f; --button:#ffffff; --button2:#ffd2e9;
      --buttonBorder:#564179; --buttonShadow:#564179; --accent:#ff94cf;
      --wall1:#fff9f1; --wall2:#ffc8a2;
    }
    body.theme-yellow{
      --body:#ffe58f; --body2:#ffc8a2; --body3:#564179;
      --screen:#fff9f1; --screen2:#fff7ba; --screenBorder:#564179;
      --ink:#27213f; --button:#ffffff; --button2:#fff7ba;
      --buttonBorder:#564179; --buttonShadow:#564179; --accent:#ffe58f;
      --wall1:#fff9f1; --wall2:#ffe58f;
    }
    body.theme-blue{
      --body:#8ee7ff; --body2:#6d5dfc; --body3:#27213f;
      --screen:#fff9f1; --screen2:#dffcff; --screenBorder:#27213f;
      --ink:#27213f; --button:#ffffff; --button2:#dffcff;
      --buttonBorder:#27213f; --buttonShadow:#27213f; --accent:#8ee7ff;
      --wall1:#fff9f1; --wall2:#6d5dfc;
    }
    body.theme-mint{
      --body:#b5f7d3; --body2:#a78bfa; --body3:#27213f;
      --screen:#fff9f1; --screen2:#e2fdeb; --screenBorder:#27213f;
      --ink:#27213f; --button:#ffffff; --button2:#e2fdeb;
      --buttonBorder:#27213f; --buttonShadow:#27213f; --accent:#b5f7d3;
      --wall1:#fff9f1; --wall2:#a78bfa;
    }
    body.theme-lavender{
      --body:#c9b6ff; --body2:#ff94cf; --body3:#564179;
      --screen:#fff9f1; --screen2:#f3eeff; --screenBorder:#564179;
      --ink:#27213f; --button:#ffffff; --button2:#f3eeff;
      --buttonBorder:#564179; --buttonShadow:#564179; --accent:#c9b6ff;
      --wall1:#fff9f1; --wall2:#ffbbdb;
    }
    body.theme-classic{
      --body:#564179; --body2:#27213f; --body3:#1c1430;
      --screen:#1c1430; --screen2:#27213f; --screenBorder:#a78bfa;
      --ink:#b5f7d3; --button:#27213f; --button2:#564179;
      --buttonBorder:#a78bfa; --buttonShadow:#1c1430; --accent:#a78bfa;
      --wall1:#1c1430; --wall2:#27213f;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    
    /* Awaru Interactive Cosmos Background */
    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100svh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: max(10px, env(safe-area-inset-top, 0px)) max(10px, env(safe-area-inset-right, 0px)) max(14px, env(safe-area-inset-bottom, 0px)) max(10px, env(safe-area-inset-left, 0px));
      font-family: "Nunito", "Noto Sans KR", system-ui, sans-serif; 
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 16%, rgba(255, 201, 238, .72), transparent 28%),
        radial-gradient(circle at 82% 26%, rgba(142, 231, 255, .58), transparent 24%),
        radial-gradient(circle at 45% 88%, rgba(181, 247, 211, .45), transparent 30%),
        linear-gradient(130deg, var(--wall2), var(--wall1), var(--body2), #cfb7ff);
      background-size: 200% 200%;
      animation: galaxyShift 22s ease-in-out infinite;
      overflow: hidden;
      -webkit-text-size-adjust: 100%;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image:
        radial-gradient(circle, rgba(255,255,255,.92) 0 1px, transparent 1.5px),
        radial-gradient(circle, rgba(255,255,255,.72) 0 1px, transparent 1.6px),
        radial-gradient(circle, rgba(255,255,255,.50) 0 1.2px, transparent 2px);
      background-size: 44px 44px, 72px 72px, 118px 118px;
      background-position: 0 0, 14px 22px, 41px 7px;
      animation: starDrift 34s linear infinite;
      opacity: .92;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(circle at 12% 72%, rgba(255, 255, 255, .26), transparent 13%),
        radial-gradient(circle at 74% 14%, rgba(255, 255, 255, .22), transparent 16%),
        radial-gradient(circle at 88% 82%, rgba(255, 255, 255, .18), transparent 19%);
      filter: blur(2px);
      animation: nebulaPulse 12s ease-in-out infinite alternate;
    }

    /* Cosmic Background Animations */
    @keyframes galaxyShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    @keyframes starDrift {
      from { background-position: 0 0, 14px 22px, 41px 7px; }
      to { background-position: 100px 150px, 114px 172px, 141px 157px; }
    }
    @keyframes nebulaPulse {
      0%, 100% { opacity: 0.7; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); }
    }
    @keyframes planetFloat {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-12px) rotate(3deg); }
    }
    @keyframes alienFloatCustom {
      0%, 100% { transform: translateY(0) translateX(0) scale(1); }
      50% { transform: translateY(-20px) translateX(10px) scale(1.05); }
    }
    @keyframes ufoCruise {
      0% { left: -70px; top: 60%; transform: scale(0.6) rotate(5deg); }
      50% { left: 50%; top: 40%; transform: scale(1) rotate(-5deg); }
      100% { left: calc(100% + 70px); top: 60%; transform: scale(0.6) rotate(5deg); }
    }
    @keyframes shooting {
      0% { transform: translate(0, 0) rotate(-25deg); opacity: 0; }
      8% { opacity: 1; }
      15% { transform: translate(-120px, 56px) rotate(-25deg); opacity: 0; }
      100% { transform: translate(-120px, 56px) rotate(-25deg); opacity: 0; }
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.1); }
    }

    /* Cosmic Backdrop Ornaments */
    .cosmic-decoration { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .planet, .shooting-star, .particle, .star-clicker, .cozy-alien { position: absolute; will-change: transform; }
    .planet { border-radius: 50%; filter: drop-shadow(0 16px 28px rgba(61, 38, 104, .26)); animation: planetFloat 9s ease-in-out infinite, dynamicColorShift 12s linear infinite; }
    .planet::before { content: ""; position: absolute; inset: 46% -34%; height: 18%; border: 3px solid rgba(255,255,255,.55); border-radius: 50%; transform: rotate(-18deg); }
    .planet.one { width: 86px; height: 86px; left: 7%; top: 10%; background: radial-gradient(circle at 35% 28%, #fff4be, #ff9ece 48%, #8d82ff); }
    .planet.two { width: 60px; height: 60px; right: 9%; top: 18%; background: radial-gradient(circle at 30% 24%, #dffcff, #8ee7ff 52%, #7167f9); animation-delay: -2.5s; }
    .planet.three { width: 104px; height: 104px; right: 4%; bottom: 10%; background: radial-gradient(circle at 32% 28%, #fff, #b5f7d3 34%, #bb98ff 76%); animation-delay: -5s; }
    .shooting-star { width: 130px; height: 2px; border-radius: 99px; background: linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,.95)); transform: rotate(-25deg); opacity: 0; animation: shooting 8s ease-in-out infinite; }
    .shooting-star.s1 { top: 12%; left: 58%; }
    .shooting-star.s2 { top: 36%; left: 18%; animation-delay: 3.6s; }
    .particle { width: 7px; height: 7px; border-radius: 2px; background: rgba(255,255,255,.72); animation: particleFloat 13s ease-in-out infinite; }
    .p1 { left: 13%; bottom: 14%; } .p2 { left: 83%; bottom: 39%; animation-delay: -4s; } .p3 { left: 46%; top: 9%; animation-delay: -7s; }
    .cozy-alien {
      width: 32px; height: 32px; left: 15%; top: 45%; font-size: 32px; opacity: 0.85;
      animation: alienFloatCustom 14s ease-in-out infinite alternate; pointer-events: none; z-index: 1;
    }
    .star-clicker {
      width: 18px; height: 18px;
      background: #fff7ba;
      clip-path: polygon(50% 0%, 61% 34%, 98% 35%, 68% 56%, 79% 91%, 50% 70%, 21% 91%, 32% 56%, 2% 35%, 39% 34%);
      filter: drop-shadow(0 0 10px rgba(255,255,255,.8));
      pointer-events: auto;
      cursor: pointer;
      animation: twinkle 1.9s ease-in-out infinite;
    }
    .star-clicker:nth-child(1) { left: 9%; top: 39%; } .star-clicker:nth-child(2) { left: 22%; top: 17%; animation-delay: -.4s; } .star-clicker:nth-child(3) { left: 76%; top: 44%; animation-delay: -.8s; } .star-clicker:nth-child(4) { left: 88%; top: 66%; animation-delay: -1.2s; } .star-clicker:nth-child(5) { left: 39%; bottom: 9%; animation-delay: -1.5s; }

    /* ==========================================================
       AWARU STYLED NOKI NOKI SHELL (Vaporwave Glass Retro Style)
       ========================================================== */
    :root{
      --lcdLine:rgba(39,33,63,.15);
      --lcdDark:#564179;
      --phoneShadow:rgba(46,24,98,.28);
    }

    .phone{
      width:min(366px, calc(100vw - 20px));
      height:min(640px, calc(100vh - 24px));
      height:min(640px, calc(100dvh - 24px - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px)));
      max-height:640px;
      min-height:500px;
      position:relative;
      z-index: 10;
      border-radius:34px 34px 48px 48px;
      border: 5px solid var(--body3);
      padding:15px 14px 16px;
      gap:8px;
      display:flex;
      flex-direction:column;
      user-select:none;
      background:
        radial-gradient(circle at 50% 3%, rgba(255,255,255,.7) 0 8%, transparent 9%),
        linear-gradient(150deg, var(--body), var(--body2) 62%, var(--body3));
      box-shadow:
        inset 0 0 0 4px rgba(255,255,255,.38),
        inset 0 -18px 26px rgba(0,0,0,.075),
        10px 12px 0 var(--phoneShadow);
    }

    .hardwareHomeBtn{
      flex:0 0 clamp(58px, 10dvh, 76px);
      width:100%;
      border:4px solid var(--body3);
      border-radius:16px 16px 31px 31px;
      background:
        radial-gradient(circle at 50% 7%, rgba(255,255,255,.48) 0 15%, transparent 16%),
        linear-gradient(180deg, rgba(255,255,255,.28), rgba(0,0,0,.055)),
        linear-gradient(150deg, var(--body2), var(--body));
      box-shadow:
        inset 3px 3px 0 rgba(255,255,255,.36),
        inset -4px -4px 0 rgba(0,0,0,.08),
        0 2px 0 rgba(255,255,255,.28);
      display:grid;
      place-items:center;
      padding:8px;
      cursor:pointer;
      color:var(--ink);
      -webkit-tap-highlight-color:transparent;
      user-select:none;
      touch-action:manipulation;
      font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      text-transform:uppercase;
    }

    .hardwareHomeBtnInner{
      min-width:132px;
      height:42px;
      border:3px solid var(--buttonBorder);
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.78), rgba(255,255,255,.36)),
        var(--button);
      box-shadow:
        inset 2px 2px 0 rgba(255,255,255,.74),
        4px 4px 0 rgba(0,0,0,.18);
    }

    .hardwareHomeBtnIcon{
      width:25px;
      height:25px;
      border:2px solid var(--buttonBorder);
      border-radius:50%;
      display:grid;
      place-items:center;
      line-height:1;
      font-size:14px;
      background:rgba(255,255,255,.48);
      box-shadow:inset 1px 1px 0 rgba(255,255,255,.72);
    }

    .hardwareHomeBtnText{
      font-size:13px;
      font-weight:900;
      letter-spacing:3px;
      padding-top:1px;
    }

    .hardwareHomeBtn:active .hardwareHomeBtnInner{
      transform:translate(4px,4px);
      box-shadow:none;
    }

    .brand{
      text-align:center;
      letter-spacing:5px;
      font-weight:bold;
      font-size:16px;
      color:var(--ink);
      opacity:.84;
      text-transform: uppercase;
      text-shadow:2px 2px 0 rgba(255,255,255,.82); 
    }

    .speaker{
      width:86px;
      height:12px;
      border-radius:999px;
      border:3px solid var(--body3);
      margin:0 auto;
      background:
        repeating-linear-gradient(90deg, rgba(0,0,0,.35) 0 4px, transparent 4px 8px),
        rgba(0,0,0,.13);
      box-shadow:
        inset 2px 2px 0 rgba(0,0,0,.13),
        1px 1px 0 rgba(255,255,255,.45);
    }

    .screen{
      flex:1;
      min-height:0;
      display:flex;
      flex-direction:column;
      overflow:hidden;
      border:4px solid var(--screenBorder);
      border-radius:13px 13px 8px 8px; 
      background:
        repeating-linear-gradient(0deg, rgba(39,33,63,.06) 0 1px, transparent 1px 4px),
        radial-gradient(circle at 50% 0%, rgba(255,255,255,.36), transparent 47%),
        linear-gradient(180deg,var(--screen),var(--screen2));
      box-shadow:
        inset 5px 5px 0 rgba(0,0,0,.13),
        inset -2px -2px 0 rgba(255,255,255,.28),
        0 0 0 2px rgba(255,255,255,.24);
      position:relative;
    }

    .screen::after{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 50% 36%, transparent 0 58%, rgba(0,0,0,.04) 100%),
        linear-gradient(90deg, rgba(255,255,255,.1), transparent 18%, transparent 82%, rgba(0,0,0,.05));
      mix-blend-mode:multiply;
    }

    .statusbar{
      height:30px;
      padding:4px 8px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
      border-bottom:3px solid var(--screenBorder); 
      background:rgba(255,255,255,.18);
      font-size:10px;
      font-weight:bold;
      white-space:nowrap;
    }

    .statusbar span:nth-child(2){
      max-width:120px;
      overflow:hidden;
      text-overflow:ellipsis;
      text-align:center;
    }

    .view{
      flex:1;
      min-height:0;
      display:none;
      flex-direction:column;
      padding:9px;
      overflow-y:auto; 
      overflow-x:hidden;
      -webkit-overflow-scrolling:touch;
      overscroll-behavior:contain;
    }
    .view.active{display:flex}

    h1,h2,h3,p{margin:0}
    .title{
      font-size:16px;
      font-weight:bold;
      letter-spacing:1.6px;
      text-align:center;
      margin-bottom:8px;
      text-transform: uppercase;
      text-shadow:1px 1px 0 rgba(255,255,255,.4);
    }
    .subtitle{
      text-align:center;
      font-size:11px;
      line-height:1.45;
      opacity:.82;
      margin-bottom:10px;
      text-transform: uppercase;
      letter-spacing:.06em;
    }
    .lcdPanel{
      border:3px solid var(--lcdDark);
      background:rgba(255,255,255,.34);
      box-shadow:4px 4px 0 rgba(0,0,0,.14); 
      padding:8px;
      border-radius:5px; 
      margin-bottom:10px;
    }

    input, textarea{
      width:100%;
      border:3px solid var(--lcdDark);
      background:rgba(255,255,255,.48);
      color:var(--ink);
      font-family: inherit;
      font-weight:bold;
      padding:9px;
      border-radius:5px; 
      box-shadow:inset 3px 3px 0 rgba(0,0,0,.095);
      outline:none;
      user-select:text;
      font-size: 16px !important; 
    }
    textarea{resize:none;min-height:60px}
    input::placeholder, textarea::placeholder{color:rgba(0,0,0,.42)}
    label{
      display:block;
      font-size:11px;
      font-weight:bold;
      margin:7px 0 4px;
      text-transform:uppercase;
      letter-spacing:.06em;
    }

    .row{display:flex;gap:8px;align-items:center}
    .row > *{flex:1}
    .tiny{font-size:11px;line-height:1.45;opacity:.82; text-transform: uppercase; letter-spacing:.06em;}
    .center{text-align:center}
    .hidden{display:none!important}

    .unreadBadge {
      background: var(--danger);
      color: #fff;
      font-size: 10px;
      font-weight: bold;
      padding: 2px 6px;
      border-radius: 4px;
      border: 2px solid var(--buttonBorder);
      margin-left: 6px;
      box-shadow: 2px 2px 0 rgba(0,0,0,.2);
    }

    .screenBtn, .menuItem, .themeChoice, .avatarChoice, .friendCard{
      width:100%;
      border:3px solid var(--buttonBorder);
      background:rgba(255,255,255,.42);
      color:var(--ink);
      padding:8px;
      border-radius:7px; 
      text-align:left;
      font-family: inherit;
      font-weight:bold;
      box-shadow:
        inset 1px 1px 0 rgba(255,255,255,.62),
        4px 4px 0 rgba(0,0,0,.18);
      cursor:pointer;
      user-select:none;
      text-transform: uppercase;
    }
    .screenBtn{
      text-align:center;
      background:rgba(255,255,255,.58);
      margin-bottom: 6px;
    }
    .screenBtn.primary{
      background:var(--ink);
      color:var(--screen);
      border-color:var(--ink);
      box-shadow:
        inset 1px 1px 0 rgba(255,255,255,.1),
        4px 4px 0 rgba(0,0,0,.22);
    }
    .screenBtn.danger{
      color:var(--screen);
      background:var(--danger);
      border-color:var(--danger);
    }
    .screenBtn:active, .menuItem:active, .themeChoice:active, .avatarChoice:active, .friendCard:active{
      transform:translate(4px,4px);
      box-shadow:none;
    }

    .menuList{
      display:grid;
      gap:7px;
    }
    .menuItem{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
      font-size:13px;
      min-height:43px;
      padding:8px 9px;
      background:linear-gradient(180deg, rgba(255,255,255,.58), rgba(255,255,255,.32));
    }
    .menuIcon{font-size:16px;width:30px;text-align:center;filter:grayscale(.25) contrast(.95);}
    .menuText{flex:1}
    .menuArrow{font-weight:bold; font-size:19px; line-height: 1;}

    .homeClock{
      font-size:clamp(30px, 11vw, 42px);
      font-weight:bold;
      text-align:center;
      letter-spacing:3px;
      margin-top:3px;
      text-shadow:
        2px 2px 0 rgba(255,255,255,.35),
        4px 4px 0 rgba(0,0,0,.08);
    }
    .homeHello{
      text-align:center;
      font-weight:bold;
      margin-bottom:10px;
      text-transform: uppercase;
      font-size: 12px;
      opacity:.92;
    }

    .avatarGrid,.themeGrid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:6px;
      margin:6px 0;
    }
    .avatarChoice{
      font-size:22px;
      text-align:center;
      padding:6px 2px;
      min-height:38px;
      background:rgba(255,255,255,.38);
    }
    .avatarChoice.selected,.themeChoice.selected{
      border-color: var(--accent);
      background:rgba(255,255,255,.9);
      transform:translate(2px,2px);
      box-shadow: 2px 2px 0 rgba(0,0,0,0.2);
    }

    .themeGrid{grid-template-columns:repeat(2,1fr)}
    .themeChoice{
      min-height:48px;
      display:flex;
      gap:6px;
      align-items:center;
      font-size:11px;
      background:rgba(255,255,255,.38);
    }
    .swatch{
      width:24px;
      height:24px;
      border:3px solid var(--buttonBorder);
      flex:none;
    }
    .swatch.pink{background:#ff94cf}
    .swatch.yellow{background:#ffe58f}
    .swatch.blue{background:#8ee7ff}
    .swatch.mint{background:#b5f7d3}
    .swatch.lavender{background:#c9b6ff}
    .swatch.classic{background:#564179}

    .profileCard{
      text-align:center;
    }
    .bigAvatar{
      font-size:42px;
      line-height:1;
      margin-bottom:4px;
    }
    .profileName{
      font-weight:bold;
      font-size:16px;
      text-transform:uppercase;
    }
    .codeBox{
      border:3px dashed var(--lcdDark);
      padding:6px;
      font-weight:bold;
      text-align:center;
      letter-spacing:1px;
      background:rgba(255,255,255,.28);
      margin:6px 0;
      user-select:text;
      border-radius:4px;
    }

    .friendCard{
      display:flex;
      align-items:center;
      gap:8px;
      margin-bottom:8px; 
      background:linear-gradient(180deg, rgba(255,255,255,.48), rgba(255,255,255,.3));
    }
    .friendAvatar{
      width:34px;
      height:34px;
      border:3px solid var(--lcdDark);
      display:grid;
      place-items:center;
      font-size:20px;
      background:rgba(255,255,255,.32);
      flex:none;
      border-radius:4px;

    /* ==========================================================
       AWARU RETRO OPENING SCREEN OVERLAY (COSMIC UFO INTRO)
       ========================================================== */
    .starfield {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      z-index: 1;
      background: radial-gradient(circle at center, #101030 0%, #050510 100%);
    }

    .star {
      position: absolute;
      background-color: #ffffff;
      border-radius: 50%;
      animation: twinkle var(--duration) infinite ease-in-out alternate;
      opacity: var(--opacity);
    }

    .nebula {
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0, 242, 254, 0.08) 0%, rgba(224, 86, 253, 0.05) 50%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
      pointer-events: none;
      filter: blur(40px);
    }

    .ufo-wrapper {
      position: relative;
      z-index: 10;
      width: 300px;
      height: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      transform: translate(-100vw, -100vh) scale(0.1) rotate(-45deg);
      animation: ufoFlyIn 4s cubic-bezier(0.25, 1, 0.5, 1) forwards, 
                 ufoHover 4s ease-in-out infinite alternate 4s;
    }

    @keyframes ufoFlyIn {
      0% {
        transform: translate(-80vw, -80vh) scale(0.1) rotate(-35deg);
      }
      60% {
        transform: translate(5vw, 5vh) scale(1.1) rotate(10deg);
      }
      100% {
        transform: translate(0, 0) scale(1) rotate(0deg);
      }
    }

    @keyframes ufoHover {
      0% {
        transform: translateY(0px) rotate(0deg);
      }
      50% {
        transform: translateY(-15px) rotate(-2deg);
      }
      100% {
        transform: translateY(10px) rotate(2deg);
      }
    }

    .ufo-svg {
      width: 100%;
      height: auto;
      filter: drop-shadow(0 10px 20px rgba(0, 242, 254, 0.3));
    }

    .ufo-light {
      animation: lightPulse var(--speed) infinite alternate;
    }

    @keyframes lightPulse {
      0% { fill-opacity: 0.3; filter: drop-shadow(0 0 1px currentColor); }
      100% { fill-opacity: 1; filter: drop-shadow(0 0 8px currentColor); }
    }

    .tractor-beam {
      position: absolute;
      top: 115px; 
      width: 160px;
      height: 280px;
      background: linear-gradient(to bottom, rgba(0, 242, 254, 0.6) 0%, rgba(0, 242, 254, 0.1) 60%, rgba(0, 242, 254, 0) 100%);
      clip-path: polygon(45% 0%, 55% 0%, 100% 100%, 0% 100%);
      opacity: 0;
      transform: scaleY(0);
      transform-origin: top center;
      z-index: 9;
      animation: beamDeploy 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards 4s,
                 beamPulse 2s ease-in-out infinite alternate 5.5s;
    }

    @keyframes beamDeploy {
      0% {
        opacity: 0;
        transform: scaleY(0);
      }
      100% {
        opacity: 1;
        transform: scaleY(1);
      }
    }

    @keyframes beamPulse {
      0% {
        opacity: 0.7;
        filter: drop-shadow(0 0 5px rgba(0, 242, 254, 0.3));
      }
      100% {
        opacity: 1;
        filter: drop-shadow(0 0 20px rgba(0, 242, 254, 0.6));
      }
    }

    .glass-dome {
      fill: url(#dome-grad);
      stroke: #00f2fe;
      stroke-width: 1px;
    }

    .cute-button {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      min-height: 38px;
      padding: 8px 20px;
      font-size: 14px;
      border-radius: 12px;
      border: 3px solid #564179;

      color: #4b3970;
      font-weight: 1000;
      box-shadow: 0 4px 0 rgba(70, 49, 117, .34), 0 8px 16px rgba(70, 49, 117, .15);
      transition: transform .18s cubic-bezier(.18,.89,.32,1.28), box-shadow .18s, filter .2s;
      cursor: pointer;
    }
    .cute-button:hover { transform: translateY(-3px) scale(1.02); filter: brightness(1.04); }
    .cute-button:active { transform: translateY(2px) scale(.98); box-shadow: 0 2px 0 rgba(70,49,117,.34); }
    .pink-button { background: linear-gradient(180deg, #ffd2e9, #ff8ec9); }

  </style>

    // --- SOUND SYSTEM ---
    let soundEnabled = localStorage.getItem("nokiSound") !== "false";
    let audioCtx = null;
    
    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      if (!audioCtx._unlocked) {
        const buffer = audioCtx.createBuffer(1, 1, 22050);
        const source = audioCtx.createBufferSource();
        source.buffer = buffer;
        source.connect(audioCtx.destination);
        source.start(0);
        audioCtx._unlocked = true;
      }
    }

    const unlockEvents = ['click', 'touchstart', 'keydown'];
    const unlockAudio = () => {
      initAudio();
      unlockEvents.forEach(e => document.removeEventListener(e, unlockAudio));
    };
    unlockEvents.forEach(e => document.addEventListener(e, unlockAudio, { once: true }));

    function playBeep(freq, type, duration) {
      if (!soundEnabled) return;
      initAudio();
      if (audioCtx.state !== 'running') return; 

      try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type; 
        osc.frequency.value = freq;
        osc.connect(gain); 
        gain.connect(audioCtx.destination);
        
        const now = audioCtx.currentTime;
        
        gain.gain.setValueAtTime(1, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
        
        osc.start(now);
        osc.stop(now + duration);
      } catch (e) { }
    }
    
    function soundTyping() { playBeep(300, 'square', 0.05); }
    function soundIncoming() {
      playBeep(800, 'sine', 0.1);
      setTimeout(() => playBeep(1200, 'sine', 0.15), 100);
    }
    function soundClick() { playBeep(450, 'square', 0.025); }
    function soundJump() { playBeep(600, 'square', 0.05); }
    function soundHit() { playBeep(150, 'sawtooth', 0.3); }
    function soundScore() { playBeep(900, 'sine', 0.1); setTimeout(() => playBeep(1200, 'sine', 0.1), 100); }

    let lastTypeTime = 0;
    $("messageInput").addEventListener("input", () => {

    // --- GAME LOGIC ---
    let dinoY = 10;
    let dinoVy = 0;
    let cactusX = 100;
    let gScore = 0;
    let gActive = false;
    let gLoop = null;

    function gameTick() {
      if (!gActive) return;

      dinoY += dinoVy;
      dinoVy -= 1.5; 
      if (dinoY <= 10) {
        dinoY = 10;
        dinoVy = 0;
      }

      cactusX -= 2.5; 
      if (cactusX < -15) {
        cactusX = 100;
        gScore++;
        $("gameScore").textContent = gScore;
        if(gScore > 0 && gScore % 5 === 0) soundScore(); 
      }

      $("dino").style.bottom = dinoY + "px";
      $("cactus").style.left = cactusX + "%";

      let gameWidth = $("gameArea").offsetWidth;
      let cPx = (cactusX / 100) * gameWidth;
      
      if (cPx > 5 && cPx < 45 && dinoY < 32) {
         gActive = false;
         $("gameOverlay").style.display = "flex";
         $("gameOverlay").textContent = t("gameOver");
         soundHit(); 
      }
    }

    function doJump(e) {
      if(e) e.preventDefault();
      
      if (!gActive) {
        gScore = 0;
        cactusX = 100;
        dinoY = 10;
        dinoVy = 0;
        gActive = true;
        $("gameScore").textContent = "0";
        $("gameOverlay").style.display = "none";
        
        if (!gLoop) gLoop = setInterval(gameTick, 30);
      }
      
      if (dinoY <= 12) { 
        dinoVy = 15; 
        soundJump();
      }
    }

    function safeText(value, fallback = "") { return String(value || fallback).replace(/[<>]/g, "").trim(); }
    function escapeHTML(value) {
      return String(value).replace(/[&<>"']/g, char => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#039;" }[char]));
    }

    function applyTheme(themeId) {

      for (let i = 0; i < 25; i++) {
        const code = "NOKI-" + Math.floor(1000 + Math.random() * 9000);
        const snap = await get(ref(db, `publicCodes/${code}`));
        if (!snap.exists()) return code;
      }
      return "NOKI-" + Date.now().toString().slice(-4);

    $("enterBtn").addEventListener("click", async () => {
      initAudio();

      const rawName = safeText($("setupName").value);

      if (uid.length < 3) return showError($("setupError"), currentLang === 'id' ? "Username min 3 karakter." : "Username min 3 chars.");
      if (rawPass.length < 4) return showError($("setupError"), currentLang === 'id' ? "Password min 4 karakter." : "Password min 4 chars.");

      $("enterBtn").disabled = true;
      try {
        const userSnap = await get(ref(db, `users/${uid}`));
        if (userSnap.exists()) {
          const existingProfile = userSnap.val();
          
          if (existingProfile.password && existingProfile.password !== rawPass) {
             $("enterBtn").disabled = false;
             return showError($("setupError"), "WRONG PASSWORD");
          }
          
          if (!existingProfile.password) {
            existingProfile.password = rawPass;
            await update(ref(db, `users/${uid}`), { password: rawPass });
          }

          profile = existingProfile;
          currentUser = { uid: profile.uid };

              uid: profile.uid,
              nickname: profile.nickname,
              avatar: profile.avatar,
              code: profile.code

      if (!profile || !currentUser) return;
      if (!confirm(t("confirmDelete"))) return;

      try {
        let updates = {};
        updates[`users/${profile.uid}`] = null;
        if (profile.code) updates[`publicCodes/${profile.code}`] = null;
        
        const friendsList = Object.values(friends || {});
        for (const f of friendsList) {
          updates[`friends/${f.uid}/${profile.uid}`] = null;
          updates[`friends/${profile.uid}/${f.uid}`] = null;
          const chatId = chatIdFor(profile.uid, f.uid);
          updates[`conversations/${chatId}`] = null;
        }
        
        await update(ref(db), updates);
        
        localStorage.removeItem("nokiUid");
        localStorage.removeItem("nokiProfile");

       try {
         let updates = {};
         updates[`users/${targetUser.uid}`] = null;
         if (targetUser.code) updates[`publicCodes/${targetUser.code}`] = null;
         
         const friendSnap = await get(ref(db, `friends/${targetUser.uid}`));
         if (friendSnap.exists()) {
           const fList = Object.values(friendSnap.val());
           for (const f of fList) {

              const chatId = chatIdFor(targetUser.uid, f.uid);

        button.className = "themeChoice" + (theme.id === selectedTheme ? " selected" : "");
        button.innerHTML = `<span class="swatch ${theme.swatch}"></span><span>${theme.label}</span>`;
        button.addEventListener("click", async () => {
          applyTheme(theme.id);
          if (profile && currentUser) {
            profile.theme = theme.id;
            localStorage.setItem("nokiProfile", JSON.stringify(profile));
            await update(ref(db, `users/${currentUser.uid}`), { theme: theme.id });
          }
          showToast(theme.label);
        });
        themeBox.appendChild(button);
      });
    }

    function updateSettingsLabels() {
      const soundLabels = { en: "SOUND: ", ko: "소리: ", id: "SUARA: " };
      $("toggleSoundBtn").textContent = soundLabels[currentLang] + (soundEnabled ? "ON" : "OFF");
      
      document.querySelectorAll(".lang-btn").forEach(btn => {
        if (btn.dataset.lang === currentLang) {
          btn.classList.add("active-lang");
        } else {
          btn.classList.remove("active-lang");
        }
      });
    }

    $("toggleSoundBtn").addEventListener("click", () => {
      soundEnabled = !soundEnabled;
      localStorage.setItem("nokiSound", soundEnabled);
      updateSettingsLabels();
      if(soundEnabled) playBeep(800, 'sine', 0.1);
    });

    document.querySelectorAll(".lang-btn").forEach(btn => {
      btn.addEventListener("click", (e) => {
        soundClick();
        currentLang = e.currentTarget.dataset.lang;
        localStorage.setItem("nokiLang", currentLang);
        applyLang();
      });
    });

    function renderHome() {
      if (!profile) return;
      $("homeHello").textContent = `${profile.avatar} ${profile.nickname}`;
    }

    function renderInbox() {
      const inbox = $("inboxFriends");
      inbox.innerHTML = "";

      const values = Object.values(friends || {});
      if (!values.length) {
        const empty = document.createElement("div");
        empty.className = "lcdPanel tiny center";
        let msg = "NO FRIENDS YET.";
        if (currentLang === 'ko') msg = "친구가 없습니다.";
        if (currentLang === 'id') msg = "BELUM ADA TEMAN.";
        empty.textContent = msg;
        inbox.appendChild(empty);
        return;
      }
      values.sort((a,b) => (b.addedAt || 0) - (a.addedAt || 0))
            .forEach(friend => {
               if (friend && friend.uid) { 
                   inbox.appendChild(friendButton(friend, true));
               }
            });
    }

    function renderFriends() {
      if (profile) $("myCodeBox").textContent = profile.code;
      const list = $("friendsList");
      list.innerHTML = "";

      const values = Object.values(friends || {});
      if (!values.length) {
        const empty = document.createElement("div");
        empty.className = "lcdPanel tiny center";
        let msg = "NO FRIENDS YET.";
        if (currentLang === 'ko') msg = "친구가 없습니다.";
        if (currentLang === 'id') msg = "BELUM ADA TEMAN.";
        empty.textContent = msg;
        list.appendChild(empty);
        return;
      }
      values.sort((a,b) => (a.nickname || "").localeCompare(b.nickname || ""))
            .forEach(friend => {
               if (friend && friend.uid) { 
                   list.appendChild(friendButton(friend, false));
               }
            });
    }

    function friendButton(friend, isInbox) {
      const card = document.createElement("div");
      card.className = "friendCard";
      card.role = "button";
      card.tabIndex = 0;
      
      let badgeHTML = '';
      if (isInbox && friend.unread) {
        badgeHTML = `<span class="unreadBadge">${friend.unread}</span>`;
      }

      let rightSide = `<div style="font-size:24px; font-weight:bold;">›</div>`;
      if (!isInbox) {
        rightSide = `<button class="removeBtn" data-uid="${friend.uid}">✕</button>`;
      }

      card.innerHTML = `
        <div class="friendAvatar">${friend.avatar || "💬"}</div>
        <div class="friendInfo">
          <div class="friendName">${escapeHTML(friend.nickname || "Friend")} ${badgeHTML}</div>
          <div class="friendSub">${escapeHTML(friend.code || "NOKI")}</div>
        </div>
        ${rightSide}
      `;
      
      card.addEventListener("click", (e) => {
        if (!isInbox && e.target.classList.contains("removeBtn")) {
          e.stopPropagation();
          removeFriend(friend);
        } else {
          openPrivateChat(friend);
        }
      });
      return card;
    }

    async function removeFriend(friend) {
      if (!profile || !friend.uid) return;
      if (!confirm(t("confirmRemove"))) return;
      
      try {
        const chatId = chatIdFor(profile.uid, friend.uid);
        await remove(ref(db, `friends/${profile.uid}/${friend.uid}`));
        await remove(ref(db, `friends/${friend.uid}/${profile.uid}`));
        await remove(ref(db, `conversations/${chatId}`)); 
        showToast(currentLang === 'ko' ? "삭제됨" : "DELETED");
      } catch(e) {
        showToast("Error: " + e.message);
      }
    }

    function watchFriends() {
      if (!currentUser || friendUnsubscribe) return;
      friendUnsubscribe = onValue(ref(db, `friends/${currentUser.uid}`), snap => {
        friends = snap.val() || {};
        
        let totalUnread = 0;
        Object.values(friends).forEach(f => { 
          if (f && f.uid) {
            totalUnread += (f.unread || 0); 
          }
        });
        const badgeSpan = $("menuInboxBadge");
        if(badgeSpan) badgeSpan.textContent = totalUnread > 0 ? ` (${totalUnread})` : "";
        
        if (navigator.setAppBadge) {
          if (totalUnread > 0) {
            navigator.setAppBadge(totalUnread).catch(e => console.error("Badge error:", e));
          } else {
            navigator.clearAppBadge().catch(e => console.error("Badge clear error:", e));
          }
        }

        if (activeView === "inboxView") renderInbox();
        if (activeView === "friendsView") renderFriends();
      });
    }

    async function addFriend() {
      if (!profile) return;
      const code = safeText($("friendCodeInput").value).toUpperCase();
      if (!code) return showToast(currentLang === 'ko' ? "코드를 입력하세요" : (currentLang === 'id' ? "KETIK KODE" : "TYPE A FRIEND CODE"));
      if (code === profile.code) return showToast(currentLang === 'ko' ? "본인 코드입니다" : (currentLang === 'id' ? "INI KODEMU SENDIRI" : "THAT IS YOUR CODE"));

      $("addFriendBtn").disabled = true;
      try {
        const codeSnap = await get(ref(db, `publicCodes/${code}`));
        if (!codeSnap.exists()) return showToast("NOT FOUND");

        const target = codeSnap.val();
        const targetUid = target.uid;
        if (!targetUid || targetUid === profile.uid) return showToast("INVALID CODE");

        const userSnap = await get(ref(db, `users/${targetUid}`));
        if (!userSnap.exists()) return showToast("USER MISSING");

        const friendProfile = userSnap.val();

        await update(ref(db), {
          [`friends/${profile.uid}/${targetUid}`]: {
            uid: targetUid, nickname: friendProfile.nickname || target.nickname,
            avatar: friendProfile.avatar || target.avatar, code: friendProfile.code || code,
            addedAt: serverTimestamp(), unread: 0
          },
          [`friends/${targetUid}/${profile.uid}`]: {
            uid: profile.uid, nickname: profile.nickname,
            avatar: profile.avatar, code: profile.code,
            addedAt: serverTimestamp()
          }
        });

        $("friendCodeInput").value = "";
        showToast(currentLang === 'ko' ? "친구 추가됨!" : (currentLang === 'id' ? "TEMAN DITAMBAHKAN!" : "FRIEND ADDED!"));
        openPrivateChat(friendProfile);
      } catch (error) {
        showToast("Add error: " + error.message);
      } finally {
        $("addFriendBtn").disabled = false;
      }
    }

    async function openPrivateChat(friend) {
      if (!profile || !friend.uid) return;
      const chatId = chatIdFor(profile.uid, friend.uid);
      
      await update(ref(db, `friends/${profile.uid}/${friend.uid}`), { unread: 0 });

      currentChat = {
        type: "private",
        title: friend.nickname || "Friend",
        avatar: friend.avatar || "💬",
        path: `conversations/${chatId}/messages`,
        targetUid: friend.uid,
        chatId
      };
      
      chatOpenedAt = Date.now();

      if (messageUnsubscribe) {
        messageUnsubscribe();
        messageUnsubscribe = null;
      }

      $("chatHeaderAvatar").textContent = currentChat.avatar;
      $("chatTitle").textContent = currentChat.title;
      $("messages").innerHTML = "";
      showView("chatView");

      const recentMessages = query(ref(db, currentChat.path), limitToLast(80));
      messageUnsubscribe = onChildAdded(recentMessages, snap => {
        renderMessage(snap.val());
      });

      setTimeout(() => {
        $("messageInput").focus();
      }, 150);
    }

    async function sendMessage() {
      if (!currentChat || !profile) return;
      const input = $("messageInput");
      const text = input.value.trim();
      if (!text) return;
      
      input.value = "";

      try {
        const message = {
          from: profile.uid,
          nickname: profile.nickname,
          avatar: profile.avatar,
          text,
          createdAt: serverTimestamp()
        };

        await update(ref(db), {
          [`${currentChat.path}/${push(ref(db)).key}`]: message,
          [`friends/${currentChat.targetUid}/${profile.uid}/unread`]: increment(1)
        });
      } catch (error) {
        showToast("Send error: " + error.message);
        input.value = text;
      }
    }

    function renderMessage(msg) {
      if (!msg) return;
      const isMine = msg.from === profile?.uid;
      const line = document.createElement("div");
      line.className = "smsLine" + (isMine ? " mine" : "");

      const time = typeof msg.createdAt === "number"
        ? new Date(msg.createdAt).toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" })
        : "sending";

      line.innerHTML = `
        <div class="smsMeta">${escapeHTML(msg.avatar || "💬")} ${escapeHTML(msg.nickname || "Guest")} · ${time}</div>
        <div class="smsText"></div>
      `;
      line.querySelector(".smsText").textContent = msg.text || "";
      $("messages").appendChild(line);

      if (!renderMessage.scrollTimer) {
        renderMessage.scrollTimer = setTimeout(() => {
          const msgBox = $("messages");
          msgBox.scrollTop = msgBox.scrollHeight;
          renderMessage.scrollTimer = null;
        }, 10);
      }

      if (!isMine && !msg._played && (typeof msg.createdAt !== 'number' || msg.createdAt > chatOpenedAt)) {
        soundIncoming();
        msg._played = true; 
      }
    }

    function renderProfile() {
      if (!profile) return;
      $("profileAvatar").textContent = profile.avatar || "💛";
      $("profileName").textContent = profile.nickname || "...";
      $("profileCode").textContent = profile.code || "...";
      $("myCodeBox").textContent = profile.code || "...";
      
      $("editNameInput").value = profile.nickname || "";
      editProfileAvatar = profile.avatar || avatars[0];
      renderEditAvatars();
    }

    async function saveIdentity() {
      if (!profile || !currentUser) return;
      const newName = safeText($("editNameInput").value, profile.nickname).slice(0, 24);
      
      if (newName.length < 3) {
        return showToast("NAME TOO SHORT!");
      }

      $("saveIdentityBtn").disabled = true;
      
      try {
        profile.nickname = newName;
        profile.avatar = editProfileAvatar;
        localStorage.setItem("nokiProfile", JSON.stringify(profile));
        
        const updates = {
          [`users/${currentUser.uid}/nickname`]: newName,
          [`users/${currentUser.uid}/avatar`]: editProfileAvatar
        };

        if (profile.code) {
          updates[`publicCodes/${profile.code}/nickname`] = newName;
          updates[`publicCodes/${profile.code}/avatar`] = editProfileAvatar;
        }

        const friendsList = Object.values(friends || {});
        for (const f of friendsList) {
           if (f && f.uid) {
             updates[`friends/${f.uid}/${currentUser.uid}/nickname`] = newName;
             updates[`friends/${f.uid}/${currentUser.uid}/avatar`] = editProfileAvatar;
           }
        }

        await update(ref(db), updates);
        
        renderProfile();
        $("saveIdentityBtn").innerText = t("saveIdentityBtn");
        showToast(currentLang === 'ko' ? "저장 완료" : (currentLang === 'id' ? "IDENTITAS DISIMPAN" : "IDENTITY SAVED"));
      } catch (e) {
        showToast("ERROR: " + e.message);
        $("saveIdentityBtn").innerText = t("saveIdentityBtn");
      } finally {
        $("saveIdentityBtn").disabled = false;
      }
    }

    async function copyCode() {
      if (!profile?.code) return;
      try {
        await navigator.clipboard.writeText(profile.code);
        showToast(currentLang === 'ko' ? "복사됨!" : (currentLang === 'id' ? "DISALIN!" : "CODE COPIED"));
      } catch {
        prompt("Copy your code:", profile.code);
      }
    }

    // --- BIND EVENTS ---
    document.addEventListener("click", (e) => { const ob = e.target.closest("[data-open]"); if (ob) showView(ob.dataset.open); });

    $("copyCodeBtn").addEventListener("click", copyCode);
    $("saveIdentityBtn").addEventListener("click", saveIdentity);
    $("addFriendBtn").addEventListener("click", addFriend);
    $("goHomeBtn").addEventListener("click", () => showView("homeView"));
    $("hardwareHomeBtn").addEventListener("click", () => {
      if (profile) {
        showView("homeView");
      } else {
        showView("setupView");
      }
    });
    $("chatBackBtn").addEventListener("click", () => {
       if (currentChat && profile) update(ref(db, `friends/${profile.uid}/${currentChat.targetUid}`), { unread: 0 });
       showView("inboxView"); 
    });
    $("messageForm").addEventListener("submit", (e) => { e.preventDefault(); sendMessage(); });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && profile) showView("homeView");
      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "enter" && activeView === "chatView") sendMessage();
    });

    renderSetupChoices();
    renderThemeSelections();
    applyTheme(selectedTheme);
    applyLang();

    // --- GENERATE TWINKLING STARS DYNAMICALLY ---
    const starfield = $("starfield");
    const starCount = 120;
    if (starfield) {
      for (let i = 0; i < starCount; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        const size = Math.random() * 2.5 + 0.5;
        const posX = Math.random() * 100;
        const posY = Math.random() * 100;
        const duration = Math.random() * 3 + 1.5;
        const opacity = Math.random() * 0.8 + 0.2;

        star.style.width = `${size}px`;
        star.style.height = `${size}px`;
        star.style.left = `${posX}%`;
        star.style.top = `${posY}%`;
        star.style.setProperty('--duration', `${duration}s`);
        star.style.setProperty('--opacity', opacity);
        starfield.appendChild(star);
      }
    }

    // --- DELAYED DEPLOYMENT OF INTERACTIVE RETRO START BUTTON ---
    setTimeout(() => {
      const btn = $("startOpeningBtn");
      if (btn) {
        btn.style.display = "inline-flex";
        btn.style.opacity = "0";
        btn.style.transition = "opacity 0.8s ease";
        btn.offsetHeight; // trigger reflow
        btn.style.opacity = "1";
      }
    }, 4500);

    // --- DISMISS OVERLAY & TRANSITION TO SILENT LOAD TARGET ---
    const startOpeningBtn = $("startOpeningBtn");
    if (startOpeningBtn) {
      startOpeningBtn.addEventListener("click", () => {
        playBeep(520, 'sine', 0.08);
        setTimeout(() => playBeep(880, 'sine', 0.15), 100);

        showView(startTargetView);

        const overlay = $("openingOverlay");
        if (overlay) {
          overlay.style.opacity = "0";
          overlay.style.transform = "translateY(-50px)";
          setTimeout(() => {
            overlay.style.display = "none";
          }, 800);
        }
      });
    }
  </script>
</body>
</html>
