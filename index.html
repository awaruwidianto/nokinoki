<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Prevents zooming on iPhone -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>NOKI NOKI</title>
  <style>
    :root{
      --body:#f9cfe2;
      --body2:#ffc1dd;
      --body3:#e99cc5;
      --screen:#e8ffdc;
      --screen2:#d5f4c7;
      --screenBorder:#8aad80;
      --ink:#203a26;
      --inkSoft:rgba(32,58,38,.7);
      --button:#fff7fb;
      --button2:#ffe6f2;
      --buttonBorder:#d886b4;
      --buttonShadow:#bf6d9b;
      --accent:#ff7db6;
      --wall1:#fff8fc;
      --wall2:#ffe2f1;
      --panel:rgba(255,255,255,.45);
      --danger:#c94b67;
    }

    body.theme-pink{
      --body:#f9cfe2; --body2:#ffc1dd; --body3:#e99cc5;
      --screen:#e8ffdc; --screen2:#d5f4c7; --screenBorder:#8aad80;
      --ink:#203a26; --button:#fff7fb; --button2:#ffe6f2;
      --buttonBorder:#d886b4; --buttonShadow:#bf6d9b; --accent:#ff7db6;
      --wall1:#fff8fc; --wall2:#ffe2f1;
    }
    body.theme-yellow{
      --body:#ffe8a8; --body2:#ffd76b; --body3:#dfb449;
      --screen:#dff7ff; --screen2:#c8effb; --screenBorder:#76aaba;
      --ink:#283b46; --button:#fff9df; --button2:#ffefb7;
      --buttonBorder:#d8b243; --buttonShadow:#bd9632; --accent:#ffc928;
      --wall1:#fff9df; --wall2:#e8f8ff;
    }
    body.theme-blue{
      --body:#d2ebff; --body2:#a8d8ff; --body3:#7eb8e8;
      --screen:#fff2c5; --screen2:#ffe7a6; --screenBorder:#c2a14d;
      --ink:#253747; --button:#f3fbff; --button2:#d8efff;
      --buttonBorder:#78acd6; --buttonShadow:#5d95bd; --accent:#69bdff;
      --wall1:#f2fbff; --wall2:#fff3d1;
    }
    body.theme-mint{
      --body:#ccf4df; --body2:#a9eccc; --body3:#7bcaa4;
      --screen:#f7e0ff; --screen2:#edcaff; --screenBorder:#aa82be;
      --ink:#243f35; --button:#f2fff8; --button2:#d8f9e9;
      --buttonBorder:#72c39b; --buttonShadow:#55a77d; --accent:#61d89e;
      --wall1:#f0fff7; --wall2:#fae9ff;
    }
    body.theme-lavender{
      --body:#e4d6ff; --body2:#d0b9ff; --body3:#aa8ce4;
      --screen:#e8ffd6; --screen2:#dafac4; --screenBorder:#94b97d;
      --ink:#342d47; --button:#fbf8ff; --button2:#eadfff;
      --buttonBorder:#a387dc; --buttonShadow:#8369bd; --accent:#b494ff;
      --wall1:#fbf8ff; --wall2:#eefee1;
    }
    body.theme-classic{
      --body:#cfd3cc; --body2:#b4bbb2; --body3:#8d978d;
      --screen:#d7e7b8; --screen2:#c7d9a3; --screenBorder:#788665;
      --ink:#1d2b20; --button:#eceee8; --button2:#d7dbd3;
      --buttonBorder:#8d978d; --buttonShadow:#747e73; --accent:#7d8b77;
      --wall1:#eff1ec; --wall2:#d4dad0;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:12px;
      font-family:"Courier New", Courier, monospace;
      color:var(--ink);
      background:
        radial-gradient(circle at 15% 18%, var(--wall1) 0 18%, transparent 18%),
        radial-gradient(circle at 80% 12%, var(--body2) 0 15%, transparent 15%),
        radial-gradient(circle at 75% 82%, var(--wall1) 0 12%, transparent 12%),
        linear-gradient(135deg,var(--wall2),#fffdf8);
      transition:background .25s ease;
    }

    .phone{
      width:min(360px,100%); /* Squarer, more classic Nokia shape */
      height:min(580px,90vh); /* Shorter screen height */
      background:linear-gradient(145deg,var(--body),var(--body2));
      border:5px solid var(--body3);
      border-radius:42px;
      box-shadow:
        inset 0 0 0 4px rgba(255,255,255,.42),
        inset 0 -25px 45px rgba(0,0,0,.08),
        0 26px 60px rgba(70,40,55,.25);
      padding:18px 16px 18px;
      display:flex;
      flex-direction:column;
      gap:14px;
      user-select:none;
    }

    .brand{
      text-align:center;
      letter-spacing:5px;
      font-weight:900;
      font-size:21px;
      color:var(--ink);
      opacity:.76;
      text-shadow:1px 1px rgba(255,255,255,.75);
    }

    .speaker{
      width:88px;
      height:10px;
      border-radius:99px;
      margin:0 auto;
      background:rgba(0,0,0,.23);
      box-shadow:inset 0 2px 4px rgba(0,0,0,.2);
    }

    .screen{
      flex:1;
      min-height:0;
      display:flex;
      flex-direction:column;
      overflow:hidden;
      border:5px solid var(--screenBorder);
      border-radius:19px;
      background:
        linear-gradient(rgba(255,255,255,.16) 50%, rgba(0,0,0,.025) 50%) 0 0/100% 6px,
        linear-gradient(180deg,var(--screen),var(--screen2));
      box-shadow:
        inset 0 0 20px rgba(0,0,0,.16),
        0 7px 15px rgba(255,255,255,.25);
      position:relative;
    }

    .statusbar{
      height:31px;
      padding:5px 9px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
      border-bottom:2px solid rgba(0,0,0,.18);
      background:rgba(255,255,255,.26);
      font-size:11px;
      font-weight:900;
      white-space:nowrap;
    }

    .statusbar span:nth-child(2){
      max-width:120px;
      overflow:hidden;
      text-overflow:ellipsis;
      text-align:center;
    }

    .view{
      flex:1;
      min-height:0;
      display:none;
      flex-direction:column;
      padding:12px;
      overflow:auto;
    }
    .view.active{display:flex}

    .boot{
      align-items:center;
      justify-content:center;
      text-align:center;
      gap:14px;
    }
    .bootLogo{
      font-size:26px;
      letter-spacing:5px;
      font-weight:900;
      animation:bootPulse 1s infinite alternate;
    }
    .bootText{font-weight:900;font-size:12px}
    .loadingBar{
      width:80%;
      height:19px;
      border:2px solid var(--ink);
      padding:2px;
      background:rgba(255,255,255,.25);
    }
    .loadingFill{
      height:100%;
      width:0%;
      background:var(--ink);
      animation:load 2.1s forwards;
    }
    @keyframes load{to{width:100%}}
    @keyframes bootPulse{from{opacity:.65}to{opacity:1}}

    h1,h2,h3,p{margin:0}
    .title{
      font-size:19px;
      font-weight:900;
      letter-spacing:1px;
      text-align:center;
      margin-bottom:8px;
    }
    .subtitle{
      text-align:center;
      font-size:12px;
      line-height:1.45;
      opacity:.82;
      margin-bottom:10px;
    }
    .lcdPanel{
      border:2px solid var(--ink);
      background:var(--panel);
      box-shadow:3px 3px 0 rgba(0,0,0,.13);
      padding:10px;
      border-radius:2px;
      margin-bottom:10px;
    }

    input, textarea{
      width:100%;
      border:2px solid var(--screenBorder);
      background:rgba(255,255,255,.58);
      color:var(--ink);
      font-family:"Courier New", Courier, monospace;
      font-weight:900;
      padding:11px;
      border-radius:4px;
      outline:none;
      user-select:text;
      font-size: 16px !important; 
    }
    textarea{resize:none;min-height:72px}
    input::placeholder, textarea::placeholder{color:rgba(0,0,0,.42)}
    label{
      display:block;
      font-size:11px;
      font-weight:900;
      margin:7px 0 4px;
      text-transform:uppercase;
    }

    .row{display:flex;gap:8px;align-items:center}
    .row > *{flex:1}
    .tiny{font-size:11px;line-height:1.45;opacity:.82}
    .center{text-align:center}
    .hidden{display:none!important}

    .unreadBadge {
      background: var(--danger);
      color: #fff;
      font-size: 11px;
      font-weight: bold;
      padding: 2px 7px;
      border-radius: 99px;
      margin-left: 6px;
      box-shadow: 1px 1px 0 rgba(0,0,0,.15);
    }

    .screenBtn, .menuItem, .themeChoice, .avatarChoice, .friendCard{
      width:100%;
      border:2px solid var(--ink);
      background:rgba(255,255,255,.42);
      color:var(--ink);
      padding:10px;
      border-radius:3px;
      text-align:left;
      font-family:"Courier New", Courier, monospace;
      font-weight:900;
      box-shadow:3px 3px 0 rgba(0,0,0,.14);
      cursor:pointer;
      user-select:none;
    }
    .screenBtn{
      text-align:center;
      background:rgba(255,255,255,.58);
      margin-bottom: 6px;
    }
    .screenBtn.primary{
      background:var(--ink);
      color:var(--screen);
    }
    .screenBtn.danger{
      color:var(--danger);
      border-color:var(--danger);
    }
    .screenBtn:active, .menuItem:active, .themeChoice:active, .avatarChoice:active, .friendCard:active{
      transform:translate(2px,2px);
      box-shadow:1px 1px 0 rgba(0,0,0,.16);
    }

    .menuList{
      display:grid;
      gap:8px;
    }
    .menuItem{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      font-size:14px;
    }
    .menuIcon{font-size:20px;width:34px;text-align:center}
    .menuText{flex:1}
    .menuArrow{opacity:.7}

    .homeClock{
      font-size:34px;
      font-weight:900;
      text-align:center;
      letter-spacing:2px;
      margin:6px 0 10px;
    }
    .homeHello{
      text-align:center;
      font-weight:900;
      margin-bottom:10px;
    }

    .avatarGrid,.themeGrid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:7px;
      margin:8px 0;
    }
    .avatarChoice{
      font-size:25px;
      text-align:center;
      padding:9px 4px;
    }
    .avatarChoice.selected,.themeChoice.selected{
      outline:3px solid var(--accent);
      background:rgba(255,255,255,.75);
    }

    .themeGrid{grid-template-columns:repeat(2,1fr)}
    .themeChoice{
      min-height:54px;
      display:flex;
      gap:8px;
      align-items:center;
      font-size:12px;
    }
    .swatch{
      width:28px;
      height:28px;
      border-radius:7px;
      border:2px solid var(--ink);
      flex:none;
    }
    .swatch.pink{background:#ffc1dd}
    .swatch.yellow{background:#ffd76b}
    .swatch.blue{background:#a8d8ff}
    .swatch.mint{background:#a9eccc}
    .swatch.lavender{background:#d0b9ff}
    .swatch.classic{background:#b4bbb2}

    .profileCard{
      text-align:center;
    }
    .bigAvatar{
      font-size:52px;
      line-height:1;
      margin-bottom:6px;
    }
    .profileName{
      font-weight:900;
      font-size:18px;
      text-transform:uppercase;
    }
    .codeBox{
      border:2px dashed var(--ink);
      padding:9px;
      font-weight:900;
      text-align:center;
      letter-spacing:1px;
      background:rgba(255,255,255,.32);
      margin:7px 0;
      user-select:text;
    }

    .friendCard{
      display:flex;
      align-items:center;
      gap:9px;
      margin-bottom:8px;
    }
    .friendAvatar{
      width:38px;
      height:38px;
      border:2px solid var(--ink);
      display:grid;
      place-items:center;
      font-size:23px;
      background:rgba(255,255,255,.45);
      flex:none;
    }
    .friendInfo{flex:1;min-width:0}
    .friendName{
      font-size:13px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      text-transform:uppercase;
      display:flex;
      align-items:center;
    }
    .friendSub{
      font-size:10px;
      opacity:.75;
      margin-top:2px;
    }
    .removeBtn {
      color: var(--danger);
      font-weight: 900;
      font-size: 16px;
      padding: 0 8px;
      display: grid;
      place-items: center;
    }

    .chatView{padding:0}
    .chatHeader{
      padding:8px 10px;
      border-bottom:2px solid rgba(0,0,0,.18);
      background:rgba(255,255,255,.2);
      display:flex;
      align-items:center;
      gap:8px;
      font-weight:900;
    }
    .chatBack{
      width:auto;
      min-width:42px;
      padding:6px;
      border:2px solid var(--ink);
      background:rgba(255,255,255,.45);
      box-shadow:none;
      color:var(--ink);
      font-family:"Courier New", Courier, monospace;
      font-weight:900;
      cursor:pointer;
    }
    .chatTitle{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .messages{
      flex:1;
      overflow:auto;
      padding:10px;
    }
    .smsLine{
      margin:0 0 10px;
      padding:8px;
      border-left:4px solid var(--ink);
      background:rgba(255,255,255,.28);
      box-shadow:2px 2px 0 rgba(0,0,0,.09);
      word-break:break-word;
    }
    .smsLine.mine{
      border-left:0;
      border-right:4px solid var(--ink);
      text-align:right;
      background:rgba(255,255,255,.48);
    }
    .smsMeta{
      font-size:10px;
      font-weight:900;
      opacity:.75;
      margin-bottom:4px;
      text-transform:uppercase;
    }
    .smsText{
      font-size:13px;
      line-height:1.35;
      white-space:pre-wrap;
      user-select:text;
    }
    .composer{
      border-top:2px solid rgba(0,0,0,.18);
      padding:8px;
      display:flex;
      gap:6px;
      background:rgba(255,255,255,.2);
    }
    .composer input{
      padding:10px;
      font-size:16px;
    }
    .composer .sendBtn{
      flex:0 0 52px;
      padding:0;
      text-align:center;
      margin-bottom: 0;
    }

    .toast{
      position:absolute;
      left:12px;
      right:12px;
      bottom:12px;
      padding:9px;
      border:2px solid var(--ink);
      background:var(--screen);
      box-shadow:3px 3px 0 rgba(0,0,0,.18);
      font-size:12px;
      font-weight:900;
      display:none;
      z-index:5;
      text-align:center;
    }
    .toast.show{display:block}

    .errorBox{
      border:2px solid var(--danger);
      color:var(--danger);
      background:rgba(255,255,255,.45);
      padding:10px;
      font-size:12px;
      font-weight:900;
      line-height:1.45;
      user-select:text;
      display:none;
      margin-bottom: 8px;
    }
    .errorBox.show{display:block}

    @media (max-height:640px){
      .phone{height:98vh;padding:12px;gap:7px}
      .brand{font-size:18px}
    }
  </style>
</head>
<body class="theme-pink">
  <main class="phone" aria-label="NOKI NOKI phone">
    <div class="brand">NOKI NOKI</div>
    <div class="speaker"></div>

    <section class="screen">
      <div class="statusbar">
        <span id="signal">▰▰▰</span>
        <span id="screenTitle">BOOT</span>
        <span><span id="clock">00:00</span> 🔋</span>
      </div>

      <div id="bootView" class="view boot active">
        <div class="bootLogo">NOKI<br>NOKI</div>
        <div class="bootText">powered by AWARU</div>
        <div class="loadingBar"><div class="loadingFill"></div></div>
        <div class="tiny center" id="bootStatus">Connecting...</div>
      </div>

      <div id="setupView" class="view">
        <h1 class="title" data-i18n="setupTitle">ACCOUNT</h1>
        <p class="subtitle" data-i18n="setupSub">Choose a username to enter.</p>

        <div class="errorBox" id="setupError"></div>

        <label for="setupName" data-i18n="usernameLabel">Username</label>
        <input id="setupName" maxlength="24" placeholder="AWARU" autocomplete="username" />

        <div id="avatarSelectSection">
          <label data-i18n="avatarLabel">Choose Avatar</label>
          <div class="avatarGrid" id="setupAvatars"></div>
        </div>

        <div style="margin-top:10px;">
          <button class="screenBtn primary" id="enterBtn" type="button" data-i18n="enterBtn">ENTER NOKI NOKI</button>
        </div>
      </div>

      <div id="homeView" class="view">
        <div class="homeClock" id="homeClock">00:00</div>
        <div class="homeHello" id="homeHello">HELLO</div>
        <div class="menuList">
          <button class="menuItem" type="button" data-open="inboxView">
            <span class="menuIcon">💬</span>
            <span class="menuText"><span data-i18n="menuMsg">Messages</span><span id="menuInboxBadge"></span></span>
            <span class="menuArrow">›</span>
          </button>
          <button class="menuItem" type="button" data-open="friendsView">
            <span class="menuIcon">👥</span><span class="menuText" data-i18n="menuFriends">Friends</span><span class="menuArrow">›</span>
          </button>
          <button class="menuItem" type="button" data-open="profileView">
            <span class="menuIcon">⭐</span><span class="menuText" data-i18n="menuProfile">Profile</span><span class="menuArrow">›</span>
          </button>
          <button class="menuItem" type="button" data-open="themesView">
            <span class="menuIcon">🎨</span><span class="menuText" data-i18n="menuThemes">Themes</span><span class="menuArrow">›</span>
          </button>
          <button class="menuItem" type="button" data-open="settingsView">
            <span class="menuIcon">⚙</span><span class="menuText" data-i18n="menuSettings">Settings</span><span class="menuArrow">›</span>
          </button>
        </div>
      </div>

      <div id="inboxView" class="view">
        <h2 class="title" data-i18n="titleMsg">MESSAGES</h2>
        <div id="inboxFriends" style="flex:1; min-height:0; overflow:auto;"></div>
        <button class="screenBtn" type="button" data-open="friendsView" data-i18n="addFriendBtn">+ ADD FRIEND</button>
        <button class="screenBtn" type="button" data-open="homeView" data-i18n="homeBtn" style="margin-top: 6px;">HOME</button>
      </div>

      <div id="friendsView" class="view">
        <h2 class="title" data-i18n="titleFriends">FRIENDS</h2>
        <div class="lcdPanel profileCard">
          <div class="tiny" data-i18n="yourCodeText">Your friend code</div>
          <div class="codeBox" id="myCodeBox">...</div>
          <button class="screenBtn" id="copyCodeBtn" type="button" data-i18n="copyBtn">COPY CODE</button>
        </div>

        <label for="friendCodeInput" data-i18n="addCodeLabel">Add friend code</label>
        <input id="friendCodeInput" maxlength="16" placeholder="NOKI-1234" autocomplete="off" />
        <button class="screenBtn primary" id="addFriendBtn" type="button" data-i18n="addFriendAction">ADD FRIEND</button>

        <h3 class="title" style="font-size:15px;margin-top:12px;" data-i18n="friendListLabel">FRIEND LIST</h3>
        <div id="friendsList" style="flex:1; min-height:0; overflow:auto; margin-bottom:10px;"></div>
        <button class="screenBtn" type="button" data-open="homeView" data-i18n="homeBtn">HOME</button>
      </div>

      <div id="profileView" class="view">
        <h2 class="title" data-i18n="titleProfile">PROFILE</h2>
        <div class="lcdPanel profileCard">
          <div class="bigAvatar" id="profileAvatar">💛</div>
          <div class="profileName" id="profileName">...</div>
          <div class="codeBox" id="profileCode">...</div>
        </div>

        <label for="editNameInput" data-i18n="editNameLabel">Edit Name</label>
        <input id="editNameInput" maxlength="24" placeholder="New name..." />
        
        <label data-i18n="editAvatarLabel">Edit Avatar</label>
        <div class="avatarGrid" id="editAvatars"></div>

        <button class="screenBtn primary" id="saveIdentityBtn" type="button" data-i18n="saveIdentityBtn">SAVE IDENTITY</button>
        <button class="screenBtn" type="button" data-open="homeView" data-i18n="homeBtn" style="margin-top:auto;">HOME</button>
      </div>

      <div id="themesView" class="view">
        <h2 class="title" data-i18n="titleThemes">THEMES</h2>
        <p class="subtitle" data-i18n="themeSub">Change your phone shell.</p>
        <div class="themeGrid" id="themeChoices" style="margin-bottom:12px;"></div>
        <button class="screenBtn" type="button" data-open="homeView" data-i18n="homeBtn" style="margin-top:auto;">HOME</button>
      </div>

      <div id="settingsView" class="view">
        <h2 class="title" data-i18n="titleSettings">SETTINGS</h2>
        <div class="lcdPanel">
          <button class="screenBtn primary" id="toggleSoundBtn" type="button">Sound: ON</button>
          <button class="screenBtn primary" id="toggleLangBtn" type="button">Language: English</button>
        </div>
        <button class="screenBtn" id="goHomeBtn" type="button" data-i18n="homeBtn">HOME</button>
        <button class="screenBtn danger" id="logoutBtn" type="button" data-i18n="logoutBtn">LOGOUT</button>
      </div>

      <div id="chatView" class="view chatView">
        <div class="chatHeader">
          <button class="chatBack" id="chatBackBtn" type="button">‹</button>
          <div id="chatHeaderAvatar">💬</div>
          <div class="chatTitle" id="chatTitle">CHAT</div>
        </div>
        <div class="messages" id="messages"></div>
        <form class="composer" id="messageForm">
          <input id="messageInput" maxlength="500" placeholder="type sms..." autocomplete="off" />
          <button class="screenBtn sendBtn" type="submit" data-i18n="sendBtn">OK</button>
        </form>
      </div>

      <div class="toast" id="toast"></div>
    </section>
  </main>

  <script type="module">
    const firebaseConfig = {
      apiKey: "AIzaSyDg0R36Cprmno-1564iciKuyQXhPrd1ieo",
      authDomain: "noki-noki-3f23e.firebaseapp.com",
      databaseURL: "https://noki-noki-3f23e-default-rtdb.asia-southeast1.firebasedatabase.app/",

    // --- SOUND SYSTEM ---
    let soundEnabled = localStorage.getItem("nokiSound") !== "false";
    let audioCtx = null;
    
    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      if (!audioCtx._unlocked) {
        const buffer = audioCtx.createBuffer(1, 1, 22050);
        const source = audioCtx.createBufferSource();
        source.buffer = buffer;
        source.connect(audioCtx.destination);
        source.start(0);
        audioCtx._unlocked = true;
      }
    }

    const unlockEvents = ['click', 'touchstart', 'keydown'];
    const unlockAudio = () => {
      initAudio();
      unlockEvents.forEach(e => document.removeEventListener(e, unlockAudio));
    };
    unlockEvents.forEach(e => document.addEventListener(e, unlockAudio, { once: true }));

    function playBeep(freq, type, duration) {
      if (!soundEnabled) return;
      initAudio();
      if (audioCtx.state !== 'running') return; 

      try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type; 
        osc.frequency.value = freq;
        osc.connect(gain); 
        gain.connect(audioCtx.destination);
        
        const now = audioCtx.currentTime;
        
        gain.gain.setValueAtTime(1, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
        
        osc.start(now);
        osc.stop(now + duration);
      } catch (e) {
        console.warn("Audio error:", e);
      }
    }
    
    function soundTyping() { playBeep(300, 'square', 0.05); }
    function soundIncoming() {
      playBeep(800, 'sine', 0.1);
      setTimeout(() => playBeep(1200, 'sine', 0.15), 100);
    }
    function soundClick() { playBeep(450, 'square', 0.025); }

    let lastTypeTime = 0;
    $("messageInput").addEventListener("input", () => {
      if (Date.now() - lastTypeTime > 100) {
        soundTyping();
        lastTypeTime = Date.now();
      }
    });

    document.addEventListener("click", (e) => {
      if (e.target.closest("#toggleSoundBtn")) return; 
      if (e.target.closest("button, .friendCard, .themeChoice, .avatarChoice, .removeBtn")) {
        soundClick();
      }
    });

    // --- MAIN APP VARS ---
    const views = {
      bootView: $("bootView"), setupView: $("setupView"), homeView: $("homeView"),
      inboxView: $("inboxView"), friendsView: $("friendsView"), profileView: $("profileView"),
      themesView: $("themesView"), settingsView: $("settingsView"), chatView: $("chatView")
    };

    const themes = [
      { id:"pink", label:"Sakura Pink", swatch:"pink" },
      { id:"yellow", label:"Pudding Yellow", swatch:"yellow" },
      { id:"blue", label:"Ice Blue", swatch:"blue" },
      { id:"mint", label:"Mint", swatch:"mint" },
      { id:"lavender", label:"Lavender", swatch:"lavender" },
      { id:"classic", label:"Classic Grey", swatch:"classic" }
    ];
    const avatars = ["💛","🌸","🐸","🐱","🐰","⭐","👾","🍓","☁️","🌙","🦋","🍀"];

    let currentUser = null; 
    let profile = null;
    let friends = {};
    let selectedAvatar = avatars[0];
    let editProfileAvatar = avatars[0]; // For profile editor
    let selectedTheme = localStorage.getItem("nokiTheme") || "pink";
    let activeView = "bootView";
    let friendUnsubscribe = null;
    let messageUnsubscribe = null;
    let currentChat = null;
    let chatOpenedAt = 0;

    function safeText(value, fallback = "") { return String(value || fallback).replace(/[<>]/g, "").trim(); }
    function escapeHTML(value) {
      return String(value).replace(/[&<>"']/g, char => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#039;" }[char]));
    }

    function applyTheme(themeId) {
      const exists = themes.some(t => t.id === themeId);
      selectedTheme = exists ? themeId : "pink";
      document.body.className = "theme-" + selectedTheme;
      localStorage.setItem("nokiTheme", selectedTheme);
      renderThemeSelections();
    }

    function showToast(message) {
      const toast = $("toast");
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 2200);
    }

    function showError(el, message) { el.textContent = message; el.classList.add("show"); }
    function hideError(el) { el.textContent = ""; el.classList.remove("show"); }

    function showView(viewId) {
      Object.values(views).forEach(v => v.classList.remove("active"));
      views[viewId].classList.add("active");
      activeView = viewId;
      const title = viewId.replace("View","").toUpperCase();
      $("screenTitle").textContent = title === "HOME" ? "made by AWARU" : title;

      if (viewId !== "chatView" && messageUnsubscribe) {
        messageUnsubscribe();
        messageUnsubscribe = null;
        currentChat = null;
      }

      if (viewId === "homeView") renderHome();
      if (viewId === "profileView") renderProfile();
      if (viewId === "inboxView") renderInbox();
      if (viewId === "friendsView") renderFriends();
    }

    function updateClock() {
      const now = new Date();
      const text = now.toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" });
      $("clock").textContent = text;
      $("homeClock").textContent = text;
    }
    updateClock();
    setInterval(updateClock, 30000);

    // --- NO PASSWORD AUTH FLOW ---
    async function generateCode() {
      for (let i = 0; i < 25; i++) {
        const code = "NOKI-" + Math.floor(1000 + Math.random() * 9000);
        const snap = await get(ref(db, `publicCodes/${code}`));
        if (!snap.exists()) return code;
      }
      return "NOKI-" + Date.now().toString().slice(-4);
    }

    // Auto-login check
    setTimeout(() => {
      const savedUid = localStorage.getItem("nokiUid");
      if (savedUid) {
        $("bootStatus").textContent = "Loading profile...";
        get(ref(db, `users/${savedUid}`)).then(snap => {
          if (snap.exists()) {
            profile = snap.val();
            currentUser = { uid: profile.uid }; 
            localStorage.setItem("nokiProfile", JSON.stringify(profile));
            applyTheme(profile.theme || selectedTheme);
            update(ref(db, `users/${profile.uid}`), { lastSeen: serverTimestamp() });
            showView("homeView");
            watchFriends();
          } else {
            localStorage.removeItem("nokiUid");
            showView("setupView");
          }
        }).catch(e => {
          showError($("setupError"), "Database connection error");
          showView("setupView");
        });
      } else {
        $("bootStatus").textContent = "";
        showView("setupView");
      }
    }, 1200);

    // Main enter button
    $("enterBtn").addEventListener("click", async () => {
      initAudio();
      hideError($("setupError"));
      const rawName = safeText($("setupName").value);
      const uid = rawName.toLowerCase().replace(/[^a-z0-9]/g, ""); 
      
      if (uid.length < 3) return showError($("setupError"), "Username must be at least 3 letters or numbers.");

      $("enterBtn").disabled = true;
      try {
        const userSnap = await get(ref(db, `users/${uid}`));
        if (userSnap.exists()) {
          profile = userSnap.val();
          currentUser = { uid: profile.uid };
          localStorage.setItem("nokiUid", uid);
          localStorage.setItem("nokiProfile", JSON.stringify(profile));
          applyTheme(profile.theme || selectedTheme);
          await update(ref(db, `users/${uid}`), { lastSeen: serverTimestamp() });
          showToast(currentLang === 'ko' ? "다시 오신 것을 환영합니다!" : "Welcome back!");
          showView("homeView");
          watchFriends();
        } else {
          const code = await generateCode();
          profile = {
            uid: uid,
            nickname: rawName,
            nicknameLower: uid,
            avatar: selectedAvatar,
            theme: selectedTheme,
            code,
            createdAt: Date.now(),
            lastSeen: Date.now()
          };

          await update(ref(db), {
            [`users/${uid}`]: profile,
            [`publicCodes/${profile.code}`]: {
              uid: profile.uid,
              nickname: profile.nickname,
              avatar: profile.avatar,
              code: profile.code
            }
          });
          
          currentUser = { uid: uid };
          localStorage.setItem("nokiUid", uid);
          localStorage.setItem("nokiProfile", JSON.stringify(profile));
          showToast("Account Created!");
          showView("homeView");
          watchFriends();
        }
      } catch (e) {
        showError($("setupError"), "Database error: " + e.message);
      } finally {
        $("enterBtn").disabled = false;
      }

    $("logoutBtn").addEventListener("click", () => {
      localStorage.removeItem("nokiUid");
      location.reload();
    });

    // --- UI RENDERING ---
    function renderSetupChoices() {
      const avatarBox = $("setupAvatars");
      avatarBox.innerHTML = "";
      avatars.forEach(avatar => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "avatarChoice" + (avatar === selectedAvatar ? " selected" : "");
        button.textContent = avatar;
        button.addEventListener("click", () => {
          selectedAvatar = avatar;
          renderSetupChoices();
        });
        avatarBox.appendChild(button);
      });
    }

    function renderEditAvatars() {
      const box = $("editAvatars");
      if(!box) return;
      box.innerHTML = "";
      avatars.forEach(avatar => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "avatarChoice" + (avatar === editProfileAvatar ? " selected" : "");
        btn.textContent = avatar;
        btn.addEventListener("click", () => {
          editProfileAvatar = avatar;
          renderEditAvatars();
        });
        box.appendChild(btn);
      });
    }

    function renderThemeSelections() {
      const themeBox = $("themeChoices");
      if (!themeBox) return;
      themeBox.innerHTML = "";

      themes.forEach(theme => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "themeChoice" + (theme.id === selectedTheme ? " selected" : "");
        button.innerHTML = `<span class="swatch ${theme.swatch}"></span><span>${theme.label}</span>`;
        button.addEventListener("click", async () => {
          applyTheme(theme.id);
          if (profile && currentUser) {
            profile.theme = theme.id;
            localStorage.setItem("nokiProfile", JSON.stringify(profile));
            await update(ref(db, `users/${currentUser.uid}`), { theme: theme.id });
          }
          showToast(theme.label);
        });
        themeBox.appendChild(button);
      });
    }

    function updateSettingsLabels() {
      $("toggleSoundBtn").textContent = (currentLang === 'ko' ? "소리: " : "Sound: ") + (soundEnabled ? "ON" : "OFF");
      $("toggleLangBtn").textContent = (currentLang === 'ko' ? "언어: 한국어" : "Language: English");
    }

    $("toggleSoundBtn").addEventListener("click", () => {
      soundEnabled = !soundEnabled;
      localStorage.setItem("nokiSound", soundEnabled);
      updateSettingsLabels();
      if(soundEnabled) playBeep(800, 'sine', 0.1);
    });

    $("toggleLangBtn").addEventListener("click", () => {
      currentLang = currentLang === 'en' ? 'ko' : 'en';
      localStorage.setItem("nokiLang", currentLang);
      applyLang();
    });

    function renderHome() {
      if (!profile) return;
      $("homeHello").textContent = `${profile.avatar} ${profile.nickname}`;
    }

    function renderProfile() {
      if (!profile) return;
      $("profileAvatar").textContent = profile.avatar;
      $("profileName").textContent = profile.nickname;
      $("profileCode").textContent = profile.code;
      $("myCodeBox").textContent = profile.code;
      
      $("editNameInput").value = profile.nickname || "";
      editProfileAvatar = profile.avatar || avatars[0];
      renderEditAvatars();
    }

    function renderInbox() {
      const inbox = $("inboxFriends");
      inbox.innerHTML = "";

      const values = Object.values(friends || {});
      if (!values.length) {
        const empty = document.createElement("div");
        empty.className = "lcdPanel tiny center";
        empty.textContent = currentLang === 'ko' ? "친구가 없습니다." : "No friends yet.";
        inbox.appendChild(empty);
        return;
      }
      values.sort((a,b) => (b.addedAt || 0) - (a.addedAt || 0))
            .forEach(friend => inbox.appendChild(friendButton(friend, true)));
    }

    function renderFriends() {
      if (profile) $("myCodeBox").textContent = profile.code;
      const list = $("friendsList");
      list.innerHTML = "";

      const values = Object.values(friends || {});
      if (!values.length) {
        const empty = document.createElement("div");
        empty.className = "lcdPanel tiny center";
        empty.textContent = currentLang === 'ko' ? "친구가 없습니다." : "No friends yet.";
        list.appendChild(empty);
        return;
      }
      values.sort((a,b) => (a.nickname || "").localeCompare(b.nickname || ""))
            .forEach(friend => list.appendChild(friendButton(friend, false)));
    }

    function friendButton(friend, isInbox) {
      const card = document.createElement("div");
      card.className = "friendCard";
      card.role = "button";
      card.tabIndex = 0;
      
      let badgeHTML = '';
      if (isInbox && friend.unread) {
        badgeHTML = `<span class="unreadBadge">${friend.unread}</span>`;
      }

      let rightSide = `<div>›</div>`;
      if (!isInbox) {
        rightSide = `<div class="removeBtn" data-uid="${friend.uid}">✕</div>`;
      }

      card.innerHTML = `
        <div class="friendAvatar">${friend.avatar || "💬"}</div>
        <div class="friendInfo">
          <div class="friendName">${escapeHTML(friend.nickname || "Friend")} ${badgeHTML}</div>
          <div class="friendSub">${escapeHTML(friend.code || "NOKI")}</div>
        </div>
        ${rightSide}
      `;
      
      card.addEventListener("click", (e) => {
        if (!isInbox && e.target.classList.contains("removeBtn")) {
          e.stopPropagation();
          removeFriend(friend);
        } else {
          openPrivateChat(friend);
        }
      });
      return card;
    }

    async function removeFriend(friend) {
      if (!profile || !friend.uid) return;
      if (!confirm(t("confirmRemove"))) return;
      
      try {
        await remove(ref(db, `friends/${profile.uid}/${friend.uid}`));
        await remove(ref(db, `friends/${friend.uid}/${profile.uid}`));
        showToast(currentLang === 'ko' ? "삭제됨" : "Friend removed");
      } catch(e) {
        showToast("Error: " + e.message);
      }
    }

    function watchFriends() {
      if (!currentUser || friendUnsubscribe) return;
      friendUnsubscribe = onValue(ref(db, `friends/${currentUser.uid}`), snap => {
        friends = snap.val() || {};
        
        let totalUnread = 0;
        Object.values(friends).forEach(f => { totalUnread += (f.unread || 0); });
        const badgeSpan = $("menuInboxBadge");
        if(badgeSpan) badgeSpan.textContent = totalUnread > 0 ? ` (${totalUnread})` : "";

        if (activeView === "inboxView") renderInbox();
        if (activeView === "friendsView") renderFriends();
      });
    }

    async function addFriend() {
      if (!profile) return;
      const code = safeText($("friendCodeInput").value).toUpperCase();
      if (!code) return showToast(currentLang === 'ko' ? "코드를 입력하세요" : "Type a friend code");
      if (code === profile.code) return showToast(currentLang === 'ko' ? "본인 코드입니다" : "That is your code");

      $("addFriendBtn").disabled = true;
      try {
        const codeSnap = await get(ref(db, `publicCodes/${code}`));
        if (!codeSnap.exists()) return showToast("Friend code not found");

        const target = codeSnap.val();
        const targetUid = target.uid;
        if (!targetUid || targetUid === profile.uid) return showToast("Invalid friend code");

        const userSnap = await get(ref(db, `users/${targetUid}`));
        if (!userSnap.exists()) return showToast("User missing");

        const friendProfile = userSnap.val();

        await update(ref(db), {
          [`friends/${profile.uid}/${targetUid}`]: {
            uid: targetUid, nickname: friendProfile.nickname || target.nickname,
            avatar: friendProfile.avatar || target.avatar, code: friendProfile.code || code,
            addedAt: serverTimestamp(), unread: 0
          },
          [`friends/${targetUid}/${profile.uid}`]: {
            uid: profile.uid, nickname: profile.nickname,
            avatar: profile.avatar, code: profile.code,
            addedAt: serverTimestamp()
          }
        });

        $("friendCodeInput").value = "";
        showToast(currentLang === 'ko' ? "친구 추가됨!" : "Friend added!");
        openPrivateChat(friendProfile);
      } catch (error) {
        showToast("Add error: " + error.message);
      } finally {
        $("addFriendBtn").disabled = false;
      }
    }

    function chatIdFor(a, b) { return [a, b].sort().join("_"); }

    async function openPrivateChat(friend) {
      if (!profile || !friend.uid) return;
      const chatId = chatIdFor(profile.uid, friend.uid);
      
      await update(ref(db, `friends/${profile.uid}/${friend.uid}`), { unread: 0 });

      currentChat = {
        type: "private",
        title: friend.nickname || "Friend",
        avatar: friend.avatar || "💬",
        path: `conversations/${chatId}/messages`,
        targetUid: friend.uid,
        chatId
      };
      
      chatOpenedAt = Date.now();

      if (messageUnsubscribe) {
        messageUnsubscribe();
        messageUnsubscribe = null;
      }

      $("chatHeaderAvatar").textContent = currentChat.avatar;
      $("chatTitle").textContent = currentChat.title;
      $("messages").innerHTML = "";
      showView("chatView");

      const recentMessages = query(ref(db, currentChat.path), limitToLast(80));
      messageUnsubscribe = onChildAdded(recentMessages, snap => {
        renderMessage(snap.val());
      });

      setTimeout(() => {
        $("messageInput").focus();
      }, 150);
    }

    async function sendMessage() {
      if (!currentChat || !profile) return;
      const input = $("messageInput");
      const text = input.value.trim();
      if (!text) return;
      
      input.value = "";

      try {
        const message = {
          from: profile.uid,
          nickname: profile.nickname,
          avatar: profile.avatar,
          text,
          createdAt: serverTimestamp()
        };

        await update(ref(db), {
          [`${currentChat.path}/${push(ref(db)).key}`]: message,
          [`friends/${currentChat.targetUid}/${profile.uid}/unread`]: increment(1)
        });
      } catch (error) {
        showToast("Send error: " + error.message);
        input.value = text;
      }
    }

    function renderMessage(msg) {
      if (!msg) return;
      const isMine = msg.from === profile?.uid;
      const line = document.createElement("div");
      line.className = "smsLine" + (isMine ? " mine" : "");

      const time = typeof msg.createdAt === "number"
        ? new Date(msg.createdAt).toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" })
        : "sending";

      line.innerHTML = `
        <div class="smsMeta">${escapeHTML(msg.avatar || "💬")} ${escapeHTML(msg.nickname || "Guest")} · ${time}</div>
        <div class="smsText"></div>
      `;
      line.querySelector(".smsText").textContent = msg.text || "";
      $("messages").appendChild(line);
      $("messages").scrollTop = $("messages").scrollHeight;

      if (!isMine && !msg._played && (typeof msg.createdAt !== 'number' || msg.createdAt > chatOpenedAt)) {
        soundIncoming();
        msg._played = true; 
      }
    }

    async function saveIdentity() {
      if (!profile || !currentUser) return;
      const newName = safeText($("editNameInput").value, profile.nickname).slice(0, 24);
      
      if (newName.length < 3) {
        return showToast("Name too short!");
      }

      profile.nickname = newName;
      profile.avatar = editProfileAvatar;
      
      localStorage.setItem("nokiProfile", JSON.stringify(profile));
      
      const updates = {
        [`users/${currentUser.uid}/nickname`]: newName,
        [`users/${currentUser.uid}/avatar`]: editProfileAvatar
      };

      if (profile.code) {
        updates[`publicCodes/${profile.code}/nickname`] = newName;
        updates[`publicCodes/${profile.code}/avatar`] = editProfileAvatar;
      }

      await update(ref(db), updates);
      
      renderProfile();
      showToast(currentLang === 'ko' ? "저장 완료" : "Identity saved");
    }

    async function copyCode() {
      if (!profile?.code) return;
      try {
        await navigator.clipboard.writeText(profile.code);
        showToast(currentLang === 'ko' ? "복사됨!" : "Code copied");
      } catch {
        prompt("Copy your code:", profile.code);
      }
    }

    // --- BIND EVENTS ---
    document.addEventListener("click", (e) => { const ob = e.target.closest("[data-open]"); if (ob) showView(ob.dataset.open); });

    $("copyCodeBtn").addEventListener("click", copyCode);
    $("saveIdentityBtn").addEventListener("click", saveIdentity);
    $("addFriendBtn").addEventListener("click", addFriend);
    $("goHomeBtn").addEventListener("click", () => showView("homeView"));
    $("chatBackBtn").addEventListener("click", () => {
       if (currentChat && profile) update(ref(db, `friends/${profile.uid}/${currentChat.targetUid}`), { unread: 0 });
       showView("inboxView"); 
    });
    $("messageForm").addEventListener("submit", (e) => { e.preventDefault(); sendMessage(); });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && profile) showView("homeView");
      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "enter" && activeView === "chatView") sendMessage();
    });

    renderSetupChoices();
    renderThemeSelections();
    applyTheme(selectedTheme);
    applyLang();
  </script>
</body>
</html>
